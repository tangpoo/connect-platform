name: Member-Service-CI

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    services:
      docker:
        image: docker:24.0.2-dind
        options: --dns 8.8.8.8

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Enable Docker CLI
        run: |
          docker --version

      - name: Set executable permission
        run: chmod +x ./gradlew

      - name: Run Tests
        run: ./gradlew --info member-service:test