server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalCors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - ${cors.url}
            allow-credentials: true
            allowedHeaders: '*'
            allowedMethods:
              - PUT
              - GET
              - POST
              - DELETE
              - OPTIONS

      routes:
        - id: member-service
          uri: http://member-service:8081
          predicates:
            - Path=/api/v1/members/**
        - id: payment-service
          uri: http://payment-service:8082
          predicates:
            - Path=/api/v1/payments/**